name: Mirai

# ----------------------------
# Snapshots / Pretrained
# ----------------------------
img_encoder_snapshot: "/mirai_pretrained_backbone/snapshots/mgh_mammo_MIRAI_Base_May20_2019.p"
transformer_snapshot:  
snapshot:  
freeze_image_encoder: false
use_precomputed_hiddens: false
state_dict_path: null

# ----------------------------
# Transformer architecture
# ----------------------------
transformer_hidden_dim: 512
num_layers: 1
num_heads: 4
dropout: 0.1

# ----------------------------
# Image / input settings
# ----------------------------
num_chan: 3
multi_image: true
num_images: 4

# ----------------------------
# ResNet backbone
# ----------------------------
model_name: mirai_full
block_layout:
  - "BasicBlock,2"
  - "BasicBlock,2"
  - "BasicBlock,2"
  - "BasicBlock,2"
block_widening_factor: 1
num_groups: 1
pool_name: Simple_AttentionPool
deep_risk_factor_pool: false
replace_snapshot_pool: false
pretrained_on_imagenet: false
pretrained_imagenet_model_name: resnet18
make_fc: false
replace_bn_with_gn: false

# ----------------------------
# Risk factors
# ----------------------------
use_risk_factors: false
pred_risk_factors: false
pred_both_sides: false
predict_birads: false
use_pred_risk_factors_at_test: false
use_pred_risk_factors_if_unk: false
pred_missing_mammos: false
also_pred_given_mammos: false
risk_factor_keys: ["density binary_family_history binary_biopsy_benign binary_biopsy_LCIS binary_biopsy_atypical_hyperplasia age menarche_age menopause_age first_pregnancy_age prior_hist race parous menopausal_status weight height ovarian_cancer ovarian_cancer_age ashkenazi brca mom_bc_cancer_history m_aunt_bc_cancer_history p_aunt_bc_cancer_history m_grandmother_bc_cancer_history p_grantmother_bc_cancer_history sister_bc_cancer_history mom_oc_cancer_history m_aunt_oc_cancer_history p_aunt_oc_cancer_history m_grandmother_oc_cancer_history p_grantmother_oc_cancer_history sister_oc_cancer_history hrt_type hrt_duration hrt_years_ago_stopped"]

# ----------------------------
# Regularization / annotations
# ----------------------------
use_region_annotation: false

# ----------------------------
# Survival analysis
# ----------------------------
survival_analysis_setup: true
max_followup: 5

# ----------------------------
# Misc / runtime settings
# ----------------------------
num_classes: 5
cuda: false
num_gpus: 1
num_shards: 1
data_parallel: false
model_parallel: false
wrap_model: false

