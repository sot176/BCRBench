[pytest]

# Only collect tests from tests/
testpaths = tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 6.0

# Add source directory to Python path
pythonpath = .

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    models: Model-related tests
    datasets: Dataset-related tests
    utils: Utility function tests
    training: Training loop tests
    evaluation: Evaluation metric tests
    config: Configuration tests
    checkpointing: Checkpoint management tests